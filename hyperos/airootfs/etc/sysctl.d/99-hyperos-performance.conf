# Hyper OS Performance Profile (safe defaults)
# Apply with: sysctl --system

# Memory behavior (laptop-friendly)
vm.swappiness = 20
vm.vfs_cache_pressure = 75
vm.dirty_background_ratio = 5
vm.dirty_ratio = 20

# Keep interactive scheduling responsive under load
kernel.sched_autogroup_enabled = 1
kernel.nmi_watchdog = 0

# Network defaults for desktop responsiveness
net.core.default_qdisc = fq_codel
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_fastopen = 3

# Reasonable file watcher limit for modern desktop apps
fs.inotify.max_user_watches = 524288
