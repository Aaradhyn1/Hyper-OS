---
# UEFI-first policy (Hyper OS)
installEFI: true
installBIOS: false

# Keep GRUB as installer-managed fallback while targeting UEFI installs
efiBootLoader: grub
kernel: linux

grubInstall: true
grubMkconfig: true
grubCfg: /boot/grub/grub.cfg

bootLoaderEntryName: "Hyper OS"
timeout: 3

efiBootloaderId: "HyperOS"
efiMountPoint: /boot/efi

installBootloader: true
probeOS: false
recheck: true

# Keep kernel cmdline conservative for broad hardware compatibility
kernelParams: "quiet splash"
