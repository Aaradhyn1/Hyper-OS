---
installEFI: true
installBIOS: true

efiBootLoader: grub
kernel: linux

grubInstall: true
grubMkconfig: true
grubCfg: /boot/grub/grub.cfg

# Target disk handling
bootLoaderEntryName: "Hyper OS"
timeout: 5

# UEFI specifics
efiBootloaderId: "HyperOS"
efiMountPoint: /boot/efi

# BIOS specifics
installBootloader: true

# Extra safety flags
probeOS: true
recheck: true

# GRUB modules
grubModules:
  - part_gpt
  - part_msdos
  - fat
  - ext2
  - normal
  - linux
  - configfile
  - search
  - search_fs_uuid
  - search_label
  - gfxterm
  - gfxmenu

# Kernel parameters
kernelParams: "quiet splash mitigations=off nowatchdog"
