---
dontChroot: false
timeout: 1200

script:
  - command: "set -Eeuo pipefail"

  # Remove live environment remnants
  - command: "apt-get -y purge live-boot live-config || true"
  - command: "rm -f /etc/systemd/system/check-live-persistence.service /usr/local/sbin/check-live-persistence"

  # Ensure essential services
  - command: "systemctl enable NetworkManager.service"
  - command: "systemctl enable lightdm.service"

  # Regenerate initramfs safely
  - command: "update-initramfs -u -k all"

  # Clean package cache
  - command: "apt-get autoremove -y"
  - command: "apt-get clean"
  - command: "rm -rf /var/lib/apt/lists/*"

  # Final sync
  - command: "sync"
