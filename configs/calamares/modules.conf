---
essentialShowModules:
  - locale
  - keyboard
  - partition
  - users
  - summary

essentialExecModules:
  - unpackfs
  - fstab
  - machineid
  - initramfs
  - bootloader

# Optional but recommended modules
optionalModules:
  - networkcfg
  - hwclock
  - services
  - users
  - displaymanager

# Execution ordering hints (Calamares controlled)
moduleSequence:
  - locale
  - keyboard
  - partition
  - unpackfs
  - fstab
  - machineid
  - initramfs
  - bootloader
  - users
  - summary

notes:
  - "Primary Calamares execution order is governed by settings.conf."
  - "Ensure unpackfs runs before bootloader."
  - "machineid must run before initramfs generation."
  - "bootloader should be last critical stage before summary."
