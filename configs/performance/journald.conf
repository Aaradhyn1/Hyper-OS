# /etc/systemd/journald.conf.d/10-hyperos-journal.conf
[Journal]

# Storage behavior
Storage=auto

# Size limits (tuned for low disk + fast I/O)
SystemMaxUse=64M
RuntimeMaxUse=32M
SystemKeepFree=50M
RuntimeKeepFree=20M

# Rate limiting
RateLimitIntervalSec=30s
RateLimitBurst=200

# Performance
Compress=yes
SyncIntervalSec=5m

# Security / integrity
Seal=no
SplitMode=uid

# Retention control
MaxFileSec=1month
