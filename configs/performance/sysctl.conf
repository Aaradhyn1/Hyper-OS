# ---- CPU & Scheduler Tuning (Anti-Jitter) ----
# Disable autogrouping to prevent task-heavy groups from monopolizing the CPU
kernel.sched_autogroup_enabled = 0
# Lower migration cost tells the scheduler tasks are "hot"; keeps them on the same cache
kernel.sched_migration_cost_ns = 50000
# Reduce the frequency of the scheduler balancing threads
kernel.sched_nr_migrate = 128
# Minimize timer migration to keep interrupts local to the initiating core
kernel.timer_migration = 0

# ---- Advanced Memory & MMU ----
# Low swappiness but keeps a small "safety valve" for inactive pages
vm.swappiness = 10
# Drastically reduce VFS cache pressure to keep file metadata in RAM (faster UI/Apps)
vm.vfs_cache_pressure = 50
# Aggressive background writeback to prevent large "I/O pauses"
vm.dirty_background_ratio = 3
vm.dirty_ratio = 10
# Increase min_free_kbytes to avoid atomic allocation failures under burst load
vm.min_free_kbytes = 131072
# Help prevent "Compaction Stall" latency
vm.compaction_proactiveness = 0

# ---- Pro-Grade Networking (Latency & Jitter) ----
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
# Bufferbloat mitigation: limit amount of unsent data in the write queue
net.ipv4.tcp_notsent_lowat = 16384
# Disable batching of TCP packets for raw speed
net.ipv4.tcp_low_latency = 1
# Fast connection recycling and handshake reduction
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_slow_start_after_idle = 0
# Backlog and connection scaling
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192

# ---- Kernel Hardening & Stability ----
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.panic = 10
kernel.watchdog_thresh = 5
