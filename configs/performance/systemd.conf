# /etc/systemd/system.conf.d/10-hyperos-performance.conf
[Manager]

# Faster failover during boot/shutdown
DefaultTimeoutStartSec=15s
DefaultTimeoutStopSec=10s
DefaultDeviceTimeoutSec=8s

# Logging (reduced noise)
LogLevel=notice

# Performance tuning
DefaultRestartSec=100ms
DefaultLimitNOFILE=65535
DefaultLimitNPROC=16384

# Reduce overhead
TimerSlackNSec=50ms
