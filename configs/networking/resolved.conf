# /etc/systemd/resolved.conf.d/10-hyperos-low-latency.conf
[Resolve]

# Primary DNS (low-latency anycast)
DNS=1.1.1.1 1.0.0.1 9.9.9.9 149.112.112.112

# Fallback DNS
FallbackDNS=8.8.8.8 8.8.4.4

# Security vs latency balance
DNSSEC=allow-downgrade
DNSOverTLS=opportunistic

# Performance tuning
Cache=yes
CacheFromLocalhost=yes

# Resolver behavior
DNSStubListener=yes
ReadEtcHosts=yes

# Reduce lookup delays
ResolveUnicastSingleLabel=yes
